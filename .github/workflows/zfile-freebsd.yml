name: Build ZFile for FreeBSD (JAR + official frontend)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Build on FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.0"
          run: |
            # 1. 安装依赖
            pkg install -y openjdk21 maven wget

            # 2. 强制使用 Java 21
            export JAVA_HOME=/usr/local/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            java -version

            # 3. 前端：下载官方预编译包并放入源码
            wget -O dist.zip https://github.com/zfile-dev/zfile-vue/releases/download/4.0.0/dist-4.0.10.zip
            rm -rf src/main/resources/static
            unzip -o dist.zip -d src/main/resources/static/
            rm dist.zip

            # 4. 后端：Maven 编译
            mvn clean package -DskipTests

            # 5. 组装部署包
            mkdir zfile-freebsd
            cp target/zfile-*.jar zfile-freebsd/zfile.jar

            # 外部 static 目录：直接从源码复制（与 jar 内一致）
            cp -r src/main/resources/static zfile-freebsd/static

            # 启动脚本
            cat > zfile-freebsd/start.sh << 'SCRIPT_EOF'
            #!/bin/sh
            JAVA_HOME=/usr/local/openjdk21
            $JAVA_HOME/bin/java -jar zfile.jar \
              --spring.web.resources.static-locations=file:./static/ \
              > zfile.log 2>&1 &
            echo "ZFile started. PID: $!"
            SCRIPT_EOF
            chmod +x zfile-freebsd/start.sh

            # 6. 打包
            tar -czvf zfile-freebsd.tar.gz zfile-freebsd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zfile-freebsd
          path: zfile-freebsd.tar.gz
