name: Build ZFile for FreeBSD (using official frontend)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Build on FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.0"
          run: |
            # ---------- 1. 安装基础工具 ----------
            pkg install -y openjdk21 maven wget

            # ---------- 2. 强制使用 Java 21 ----------
            export JAVA_HOME=/usr/local/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            java -version

            # ---------- 3. 获取官方前端文件 ----------
            # 下载官方发布的 tar.gz 包（已验证存在）
            wget -O zfile-official.tar.gz https://github.com/zfile-dev/zfile/releases/download/4.5.0/zfile-release_linux_amd64.tar.gz
            
            # 解压 tar.gz 里面的 jar 文件
            tar -xzf zfile-official.tar.gz
            
            # 清空默认静态资源目录，从官方 jar 中提取前端文件
            rm -rf src/main/resources/static
            mkdir -p src/main/resources/static
            unzip -o zfile-release.jar "BOOT-INF/classes/static/*" -d tmp_static
            mv tmp_static/BOOT-INF/classes/static/* src/main/resources/static/
            rm -rf tmp_static zfile-official.tar.gz zfile-release.jar

            # ---------- 4. 编译后端 ----------
            mvn clean package -DskipTests

            # ---------- 5. 制作 FreeBSD 部署包 ----------
            mkdir zfile-freebsd
            cp target/zfile-*.jar zfile-freebsd/zfile.jar

            # 启动脚本
            cat > zfile-freebsd/start.sh << 'SCRIPT_EOF'
            #!/bin/sh
            JAVA_HOME=/usr/local/openjdk21
            $JAVA_HOME/bin/java -jar zfile.jar \
              --spring.web.resources.static-locations=file:./static/ \
              > zfile.log 2>&1 &
            echo "ZFile started. PID: $!"
            SCRIPT_EOF
            chmod +x zfile-freebsd/start.sh

            # 提取外部静态文件（可选，供启动脚本使用）
            mkdir zfile-freebsd/static
            unzip -o zfile.jar "BOOT-INF/classes/static/*" -d tmp_static
            mv tmp_static/BOOT-INF/classes/static/* zfile-freebsd/static/
            rm -rf tmp_static

            # 打包
            tar -czvf zfile-freebsd.tar.gz zfile-freebsd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zfile-freebsd
          path: zfile-freebsd.tar.gz
