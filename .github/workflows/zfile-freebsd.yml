name: Build ZFile for FreeBSD (frontend + bin from official tar.gz)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Build on FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.0"
          run: |
            # 1. 安装依赖
            pkg install -y openjdk21 maven wget

            # 2. 强制使用 Java 21
            export JAVA_HOME=/usr/local/openjdk21
            export PATH=$JAVA_HOME/bin:$PATH
            java -version

            # 3. 下载官方 v4.5.0 Linux 发布包
            wget -O zfile-official.tar.gz https://github.com/zfile-dev/zfile/releases/download/4.5.0/zfile-release_linux_amd64.tar.gz
            
            # 4. 解压发布包
            mkdir -p zfile-extracted
            tar -xzf zfile-official.tar.gz -C zfile-extracted
            
            # 5. 提取前端静态文件到后端源码目录（用于编译 jar）
            rm -rf src/main/resources/static
            cp -r zfile-extracted/static src/main/resources/static

            # 6. 后端：Maven 编译
            mvn clean package -DskipTests

            # 7. 组装部署包
            mkdir zfile-freebsd
            cp target/zfile-*.jar zfile-freebsd/zfile.jar

            # 外部静态目录：直接复制源码中的 static（与 jar 内一致）
            cp -r src/main/resources/static zfile-freebsd/static

            # 复制官方的 application.properties 和 bin 目录
            if [ -f zfile-extracted/application.properties ]; then
              cp zfile-extracted/application.properties zfile-freebsd/
            fi
            if [ -d zfile-extracted/bin ]; then
              cp -r zfile-extracted/bin zfile-freebsd/
              chmod +x zfile-freebsd/bin/*
            fi

            # 保留自定义启动脚本（方便直接使用）
            cat > zfile-freebsd/start.sh << 'SCRIPT_EOF'
            #!/bin/sh
            JAVA_HOME=/usr/local/openjdk21
            $JAVA_HOME/bin/java -jar zfile.jar \
              --spring.web.resources.static-locations=file:./static/ \
              > zfile.log 2>&1 &
            echo "ZFile started. PID: $!"
            SCRIPT_EOF
            chmod +x zfile-freebsd/start.sh

            # 清理临时文件
            rm -rf zfile-extracted zfile-official.tar.gz

            # 8. 打包
            tar -czvf zfile-freebsd.tar.gz zfile-freebsd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zfile-freebsd
          path: zfile-freebsd.tar.gz
